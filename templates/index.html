<!DOCTYPE html>
<html>
<head>
    <title>YouTube Transcriber</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

</head>

<body class="bg-gray-100 p-8">

    <!-- PHẦN 1: URL INPUT -->
    <div class="mb-6">

        <input id="urlInput"
               class="w-full p-3 border rounded"
               placeholder="Enter YouTube URL..." />

        <button onclick="processURL()"
                class="mt-3 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
            Process
        </button>

        <!-- Progress Bar -->
        <div id="progressContainer"
             class="w-full bg-gray-200 rounded mt-4 hidden">

            <div id="progressBar"
                 class="bg-blue-600 text-xs font-medium text-white text-center p-0.5 leading-none rounded transition-all duration-300"
                 style="width: 0%">
                0%
            </div>

        </div>

    </div>

    <!-- PHẦN 2: KẾT QUẢ -->
    <div class="grid grid-cols-2 gap-6">

        <!-- LEFT SIDE -->
        <div class="bg-white p-4 rounded shadow">

            <h3 class="font-bold mb-2">Original Language:</h3>

            <p id="detectedLang"
               class="mb-4 text-blue-600 font-semibold">
            </p>

            <textarea id="originalText"
                      class="w-full h-96 border p-2 rounded resize-none">
            </textarea>

        </div>

        <!-- RIGHT SIDE -->
        <div class="bg-white p-4 rounded shadow">

            <h3 class="font-bold mb-2">Translate To:</h3>

            <select id="targetLang"
                    class="w-full border p-2 rounded">

                <option value="vi" selected>Vietnamese</option>
                <option value="en">English</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="zh-CN">Chinese</option>
                <option value="es">Spanish</option>
                <option value="ru">Russian</option>

            </select>

            <textarea id="translatedText"
                      class="w-full h-96 border p-2 rounded mt-4 resize-none">
            </textarea>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        async function processURL() {

            const url = document.getElementById("urlInput").value;
            const targetLang = document.getElementById("targetLang").value;

            if (!url) return;

            const container = document.getElementById("progressContainer");
            const bar = document.getElementById("progressBar");

            // Reset & show
            container.classList.remove("hidden");
            bar.style.width = "10%";
            bar.innerText = "10%";

            try {

                const response = await fetch("/process", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        url: url,
                        target_lang: targetLang
                    })
                });

                // Đang xử lý server
                bar.style.width = "70%";
                bar.innerText = "70%";

                const data = await response.json();

                // Hoàn tất
                bar.style.width = "100%";
                bar.innerText = "100%";

                // Hiển thị kết quả
                document.getElementById("detectedLang").innerText = data.detected_language;
                document.getElementById("originalText").value = data.original_text;
                document.getElementById("translatedText").value = data.translated_text;

                // Ẩn progress sau khi hoàn tất
                setTimeout(() => {
                    container.classList.add("hidden");
                    bar.style.width = "0%";
                    bar.innerText = "0%";
                }, 800);

            } catch (error) {
                console.error(error);
                container.classList.add("hidden");
            }
        }
    </script>

</body>
</html>
